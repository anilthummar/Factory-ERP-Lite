name: factory_erp_lite

description: >
  Factory ERP Lite is an offline-first enterprise resource planning application
  for factories and manufacturing businesses. It provides labor management,
  expense tracking, material purchases, calendar management, factory status
  monitoring, reporting, analytics, and real-time synchronization using
  Flutter, Firebase, and Hive.

publish_to: 'none'

version: 1.0.4+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Foundation — state management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Foundation — dependency injection
  get_it: ^8.0.3

  # Foundation — navigation (target)
  go_router: ^15.1.2

  # Foundation — Firebase
  firebase_core: ^3.13.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.8
  firebase_storage: ^12.4.8
  firebase_remote_config: ^5.0.2
  firebase_messaging: ^15.0.2
  google_sign_in: ^6.2.2

  # Foundation — offline-first local database
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.1.0

  # Foundation — connectivity & logging
  connectivity_plus: ^5.0.2
  logger: ^2.5.0

  # Navigation — current scaffold (migrate to go_router)
  auto_route: ^9.2.2

  # Local prefs (auth flags, locale, user id)
  get_storage: ^2.1.1

  # Networking
  dio: ^5.5.0+1
  awesome_dio_interceptor: ^1.2.0
  network_cache_interceptor: ^1.2.4

  # Models & serialization
  freezed_annotation: ^2.4.2
  json_annotation: ^4.9.0

  # UI & assets
  flutter_easyloading: ^3.0.5
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  google_fonts: ^6.3.2
  shimmer: ^3.0.0
  dotted_border: ^2.1.0

  # Notifications
  awesome_notifications: ^0.10.1

  # Observability
  sentry_flutter: ^8.4.0
  sentry_dio: ^8.3.0
  sentry_logging: ^8.3.0

  # Platform & utilities
  async: ^2.11.0
  device_info_plus: ^9.0.2
  package_info_plus: ^4.0.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  intl: ^0.20.2
  url_launcher: ^6.3.0
  url_strategy: ^0.2.0
  universal_html: ^2.2.4
  encrypt: ^5.0.1
  file_picker: ^11.0.2

  # Reports — PDF export & print/share
  pdf: ^3.11.3
  printing: ^5.14.2

  # Reports — Excel (.xlsx) export & share
  excel: ^4.0.6
  share_plus: ^10.1.4

  # Backup — Google Sheets export
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  fake_cloud_firestore: ^3.1.0

  # Code generation
  build_runner: ^2.4.12
  auto_route_generator: ^9.2.2
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  flutter_gen_runner: ^5.10.0
  hive_ce_generator: ^1.9.2

flutter_gen:
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - assets/png/
    - assets/svgs/
    - assets/webp/
    - assets/json/

  fonts:
    - family: Hellix
      fonts:
        - asset: fonts/HellixTRIAL-Medium.otf
